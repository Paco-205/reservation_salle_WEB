<h2>Liste des salles</h2>

<a href="{% url 'admin_dashboard' %}">Retour</a>

<table border="1">
    <tr>
        <th>Nom</th>
        <th>Capacité</th>
        <th>Localisation</th>
    </tr>
    {% for salle in salles %}
    <tr>
        <td>{{ salle.nom }}</td>
        <td>{{ salle.capacite }}</td>
        <td>{{ salle.localisation }}</td>
    </tr>
    {% endfor %}
</table>
